<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <style>
      .pulse1 { animation: pulse 2s ease-out infinite; transform-origin: 128px 148px; }
      .pulse2 { animation: pulse 2s ease-out 0.5s infinite; transform-origin: 128px 148px; }
      .pulse3 { animation: pulse 2s ease-out 1s infinite; transform-origin: 128px 148px; }
      .dash-l { animation: dashMove 1.8s linear infinite; }
      .dash-r { animation: dashMove 1.8s linear 0.6s infinite; }
      @keyframes pulse {
        0%   { opacity: 0; transform: scale(0.85); }
        30%  { opacity: 0.55; }
        100% { opacity: 0; transform: scale(1.2); }
      }
      @keyframes dashMove {
        0%   { stroke-dashoffset: 80; opacity: 1; }
        100% { stroke-dashoffset: 0;  opacity: 0.2; }
      }
    </style>
  </defs>

  <rect width="256" height="256" fill="white" rx="48"/>

  <!-- Pulse rings -->
  <circle class="pulse1" cx="128" cy="148" r="22" fill="none" stroke="#6B4FBB" stroke-width="1.5"/>
  <circle class="pulse2" cx="128" cy="148" r="34" fill="none" stroke="#8B6FDB" stroke-width="1.1"/>
  <circle class="pulse3" cx="128" cy="148" r="46" fill="none" stroke="#A89EE8" stroke-width="0.8"/>

  <!-- V ghost -->
  <polyline points="82,52 128,148 174,52" fill="none" stroke="#6B4FBB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>

  <!-- Dashes left arm -->
  <polyline class="dash-l" points="128,148 82,52" fill="none" stroke="#6B4FBB" stroke-width="3" stroke-dasharray="7 5" stroke-dashoffset="80" stroke-linecap="round"/>
  <!-- Dashes right arm -->
  <polyline class="dash-r" points="128,148 174,52" fill="none" stroke="#8B6FDB" stroke-width="3" stroke-dasharray="7 5" stroke-dashoffset="80" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="128" cy="148" r="7" fill="#1E1252"/>
  <circle cx="128" cy="148" r="4" fill="#6B4FBB"/>

  <!-- Arm end dots -->
  <circle cx="82" cy="52" r="6" fill="#6B4FBB"/>
  <circle cx="174" cy="52" r="6" fill="#6B4FBB"/>

  <!-- Accent dots -->
  <circle cx="105" cy="103" r="3" fill="#A89EE8" opacity="0.7"/>
  <circle cx="151" cy="103" r="3" fill="#A89EE8" opacity="0.7"/>

  <!-- Wordmark pequeño abajo -->
  <text x="128" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="500" letter-spacing="6" fill="#1E1252">
    <tspan fill="#6B4FBB">V</tspan>INCULA
  </text>
</svg>
